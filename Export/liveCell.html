%receives live R,C vectors and indices m,n then iterates through already
%given live cells to see if indices is present
function out = liveCell(R,C,m,n)
b = [m n];
    for i = 1:length(R)
        if b == [R(i), C(i)]
            out = true;
            break;
        else
            out = false;
        end
    end
end
